---
name: Deploy Network Automation

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "test"
        type: choice
        options:
          - test
          - acceptance
          - production

jobs:
  validate:
    name: Validate configuration
    runs-on:
      - self-hosted
      - network-runner

    env:
      TARGET_ENV: ${{ github.event.inputs.environment || 'test' }}

      ARISTA_API_USERNAME: ${{ secrets.ARISTA_API_USERNAME }}
      ARISTA_API_PASSWORD: ${{ secrets.ARISTA_API_PASSWORD }}
      ARISTA_SLEAF01_HOST: ${{ secrets.ARISTA_SLEAF01_HOST }}
      ARISTA_SLEAF02_HOST: ${{ secrets.ARISTA_SLEAF02_HOST }}
      ARISTA_SLEAF03_HOST: ${{ secrets.ARISTA_SLEAF03_HOST }}

      FORTIGATE_HOST: ${{ secrets.FORTIGATE_HOST }}
      FORTIGATE_API_TOKEN: ${{ secrets.FORTIGATE_API_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Activate runner Python environment
        run: |
          echo "$HOME/runner-venv/bin" >> $GITHUB_PATH

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Run YAML lint
        run: |
          yamllint ansible/ .github/workflows/ batfish/

      - name: Run Ansible lint
        run: |
          ansible-lint ansible/playbooks/ ansible/roles/

      - name: Run Ansible syntax check
        run: |
          ansible-playbook ansible/playbooks/validate.yml \
            -i "ansible/inventories/${TARGET_ENV}/hosts.yml" \
            -e "target_environment=${TARGET_ENV}" \
            --syntax-check

          ansible-playbook ansible/playbooks/deploy.yml \
            -i "ansible/inventories/${TARGET_ENV}/hosts.yml" \
            -e "target_environment=${TARGET_ENV}" \
            --syntax-check

          ansible-playbook ansible/playbooks/verify.yml \
            -i "ansible/inventories/${TARGET_ENV}/hosts.yml" \
            -e "target_environment=${TARGET_ENV}" \
            --syntax-check

      - name: Run Ansible data validation
        run: |
          ansible-playbook ansible/playbooks/validate.yml \
            -i "ansible/inventories/${TARGET_ENV}/hosts.yml" \
            -e "target_environment=${TARGET_ENV}"

  batfish:
    name: Validate network with Batfish
    runs-on:
      - self-hosted
      - network-runner

    needs:
      - validate

    env:
      TARGET_ENV: ${{ github.event.inputs.environment || 'test' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Start Batfish container
        run: |
          docker rm -f batfish || true

          docker run -d \
            --name batfish \
            -p 9997:9997 \
            -p 9996:9996 \
            batfish/allinone

          sleep 30

      - name: Activate runner Python environment
        run: |
          echo "$HOME/runner-venv/bin" >> $GITHUB_PATH

      - name: Install Batfish dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install pybatfish pandas

      - name: Run Batfish validation
        run: |
          python3 batfish/validate.py

  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'test' }}
    runs-on:
      - self-hosted
      - network-runner

    needs:
      - validate
      - batfish

    environment:
      name: ${{ github.event.inputs.environment || 'test' }}

    env:
      TARGET_ENV: ${{ github.event.inputs.environment || 'test' }}

      ARISTA_API_USERNAME: ${{ secrets.ARISTA_API_USERNAME }}
      ARISTA_API_PASSWORD: ${{ secrets.ARISTA_API_PASSWORD }}
      ARISTA_SLEAF01_HOST: ${{ secrets.ARISTA_SLEAF01_HOST }}
      ARISTA_SLEAF02_HOST: ${{ secrets.ARISTA_SLEAF02_HOST }}
      ARISTA_SLEAF03_HOST: ${{ secrets.ARISTA_SLEAF03_HOST }}

      FORTIGATE_HOST: ${{ secrets.FORTIGATE_HOST }}
      FORTIGATE_API_TOKEN: ${{ secrets.FORTIGATE_API_TOKEN }}
      SUDO_PASSWORD: ${{ secrets.SUDO_PASSWORD }}
      VPN_PROFILE: ${{ secrets.VPN_PROFILE }}
      VPN_USERNAME: ${{ secrets.VPN_USERNAME }}
      VPN_PASSWORD: ${{ secrets.VPN_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Verify sudo credentials
        run: |
          echo "Runner user: $(whoami)"
          echo "Runner groups: $(id -nG)"

          if [ -z "$SUDO_PASSWORD" ]; then
            echo "::error::SUDO_PASSWORD secret is empty"
            exit 1
          fi

          if sudo -n true 2>/dev/null; then
            echo "Passwordless sudo is available"
            exit 0
          fi

          printf '%s\n' "$SUDO_PASSWORD" | sudo -S -p '' -v || {
            echo "::error::SUDO_PASSWORD is invalid for the runner user, or the runner user is not allowed to use sudo"
            exit 1
          }

      - name: Install system dependencies
        run: |
          printf '%s\n' "$SUDO_PASSWORD" | sudo -S -p '' apt-get update
          printf '%s\n' "$SUDO_PASSWORD" | sudo -S -p '' apt-get install -y openvpn iproute2 iputils-ping curl

      - name: Activate runner Python environment
        run: |
          echo "$HOME/runner-venv/bin" >> $GITHUB_PATH

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Write VPN configuration
        run: |
          printf '%s\n' "$VPN_PROFILE" > vpn.ovpn
          printf '%s\n%s\n' "$VPN_USERNAME" "$VPN_PASSWORD" > vpn-auth.txt

          if [ ! -s vpn.ovpn ]; then
            echo "::error::VPN_PROFILE secret is empty"
            exit 1
          fi

          if [ "$(sed -n '1p' vpn-auth.txt | wc -c)" -le 1 ] || [ "$(sed -n '2p' vpn-auth.txt | wc -c)" -le 1 ]; then
            echo "::error::VPN_USERNAME or VPN_PASSWORD secret is empty"
            exit 1
          fi

          chmod 600 vpn.ovpn vpn-auth.txt

      - name: Connect to VPN
        run: |
          print_vpn_log() {
            if [ -f vpn.log ]; then
              echo "::group::OpenVPN log"
              printf '%s\n' "$SUDO_PASSWORD" | sudo -S -p '' sed -n '1,200p' vpn.log
              echo "::endgroup::"
            fi
          }

          printf '%s\n' "$SUDO_PASSWORD" | sudo -S -p '' openvpn \
            --config vpn.ovpn \
            --auth-user-pass vpn-auth.txt \
            --daemon \
            --log vpn.log \
            --writepid openvpn.pid || {
              echo "::error::OpenVPN failed to start"
              print_vpn_log
              exit 1
            }

          sleep 20

          VPN_PID="$(printf '%s\n' "$SUDO_PASSWORD" | sudo -S -p '' sed -n '1p' openvpn.pid 2>/dev/null || true)"
          if [ -z "$VPN_PID" ] || ! printf '%s\n' "$SUDO_PASSWORD" | sudo -S -p '' kill -0 "$VPN_PID" 2>/dev/null; then
            echo "::error::OpenVPN stopped during startup"
            print_vpn_log
            exit 1
          fi

      - name: Show VPN routes
        run: |
          ip route

      - name: Test device API reachability
        run: |
          failures=0

          check_device() {
            name="$1"
            host="$2"
            target="$host"

            if [ -z "$host" ]; then
              echo "::error::$name host secret is empty"
              failures=1
              return
            fi

            if ! printf '%s' "$host" | grep -Eq '^([0-9]{1,3}\.){3}[0-9]{1,3}$'; then
              target="$(getent hosts "$host" | awk '{print $1; exit}')"
              if [ -z "$target" ]; then
                echo "::error::$name host '$host' cannot be resolved"
                failures=1
                return
              fi
            fi

            echo "Checking $name API reachability"
            ip route get "$target" || true

            if ! timeout 10 bash -c "true < /dev/tcp/${host}/443"; then
              echo "::error::$name is not reachable on TCP/443 after VPN connection"
              failures=1
            fi
          }

          check_device "SLEAF01" "$ARISTA_SLEAF01_HOST"
          check_device "SLEAF02" "$ARISTA_SLEAF02_HOST"
          check_device "SLEAF03" "$ARISTA_SLEAF03_HOST"
          check_device "FortiGate" "$FORTIGATE_HOST"

          if [ "$failures" -ne 0 ]; then
            exit 1
          fi

      - name: Create deployment change preview
        id: deployment_preview
        run: |
          mkdir -p deployment-previews
          PREVIEW_FILE="deployment-previews/${TARGET_ENV}-deployment-preview.txt"

          {
            echo "Deployment preview"
            echo "Environment: ${TARGET_ENV}"
            echo "Commit: ${GITHUB_SHA}"
            echo "Generated at: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo
          } > "$PREVIEW_FILE"

          ansible-playbook ansible/playbooks/deploy.yml \
            -i "ansible/inventories/${TARGET_ENV}/hosts.yml" \
            -e "target_environment=${TARGET_ENV}" \
            --check \
            --diff 2>&1 | tee -a "$PREVIEW_FILE"

          status="${PIPESTATUS[0]}"
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload deployment change preview
        if: always() && steps.deployment_preview.outcome != 'skipped'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.TARGET_ENV }}-deployment-preview
          path: deployment-previews/${{ env.TARGET_ENV }}-deployment-preview.txt
          if-no-files-found: error

      - name: Add deployment preview to summary
        if: always() && steps.deployment_preview.outcome != 'skipped'
        run: |
          PREVIEW_FILE="deployment-previews/${TARGET_ENV}-deployment-preview.txt"

          {
            echo "## Deployment Preview (${TARGET_ENV})"
            echo
            echo "Ansible preview exit code: \`${{ steps.deployment_preview.outputs.exit_code }}\`"
            echo
            echo "Download the full text file from the workflow artifact:"
            echo "\`${TARGET_ENV}-deployment-preview\`"
            echo
            echo "<details><summary>Preview output</summary>"
            echo
            echo '```text'
            sed -n '1,300p' "$PREVIEW_FILE"
            echo '```'
            echo
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Stop after preview for non-production
        if: env.TARGET_ENV != 'production'
        run: |
          echo "Environment ${TARGET_ENV} is preview-only. Configuration apply is only allowed for production."

      - name: Deploy configuration
        if: env.TARGET_ENV == 'production'
        run: |
          ansible-playbook ansible/playbooks/deploy.yml \
            -i "ansible/inventories/${TARGET_ENV}/hosts.yml" \
            -e "target_environment=${TARGET_ENV}"

      - name: Verify deployment
        if: env.TARGET_ENV == 'production'
        run: |
          ansible-playbook ansible/playbooks/verify.yml \
            -i "ansible/inventories/${TARGET_ENV}/hosts.yml" \
            -e "target_environment=${TARGET_ENV}"

      - name: Cleanup VPN
        if: always()
        run: |
          printf '%s\n' "$SUDO_PASSWORD" | sudo -S -p '' pkill openvpn || true
          rm -f vpn.ovpn vpn-auth.txt vpn.log openvpn.pid
