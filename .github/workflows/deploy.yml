---
name: Deploy Network Automation

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "test"
        type: choice
        options:
          - test
          - acceptance
          - production

jobs:
  validate:
    name: Validate configuration
    runs-on:
      - self-hosted
      - network-runner

    env:
      TARGET_ENV: ${{ github.event.inputs.environment || 'test' }}

      ARISTA_API_USERNAME: ${{ secrets.ARISTA_API_USERNAME }}
      ARISTA_API_PASSWORD: ${{ secrets.ARISTA_API_PASSWORD }}
      ARISTA_SLEAF01_HOST: ${{ secrets.ARISTA_SLEAF01_HOST }}
      ARISTA_SLEAF02_HOST: ${{ secrets.ARISTA_SLEAF02_HOST }}
      ARISTA_SLEAF03_HOST: ${{ secrets.ARISTA_SLEAF03_HOST }}

      FORTIGATE_HOST: ${{ secrets.FORTIGATE_HOST }}
      FORTIGATE_API_TOKEN: ${{ secrets.FORTIGATE_API_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Activate runner Python environment
        run: |
          echo "$HOME/runner-venv/bin" >> $GITHUB_PATH

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Run YAML lint
        run: |
          yamllint ansible/ .github/workflows/ batfish/

      - name: Run Ansible lint
        run: |
          ansible-lint ansible/playbooks/ ansible/roles/

      - name: Run Ansible syntax check
        run: |
          ansible-playbook ansible/playbooks/validate.yml \
            -i "ansible/inventories/${TARGET_ENV}/hosts.yml" \
            -e "target_environment=${TARGET_ENV}" \
            --syntax-check

          ansible-playbook ansible/playbooks/deploy.yml \
            -i "ansible/inventories/${TARGET_ENV}/hosts.yml" \
            -e "target_environment=${TARGET_ENV}" \
            --syntax-check

          ansible-playbook ansible/playbooks/verify.yml \
            -i "ansible/inventories/${TARGET_ENV}/hosts.yml" \
            -e "target_environment=${TARGET_ENV}" \
            --syntax-check

      - name: Run Ansible data validation
        run: |
          ansible-playbook ansible/playbooks/validate.yml \
            -i "ansible/inventories/${TARGET_ENV}/hosts.yml" \
            -e "target_environment=${TARGET_ENV}"

  batfish:
    name: Validate network with Batfish
    runs-on:
      - self-hosted
      - network-runner

    needs:
      - validate

    env:
      TARGET_ENV: ${{ github.event.inputs.environment || 'test' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Start Batfish container
        run: |
          docker rm -f batfish || true

          docker run -d \
            --name batfish \
            -p 9997:9997 \
            -p 9996:9996 \
            batfish/allinone

          sleep 30

      - name: Activate runner Python environment
        run: |
          echo "$HOME/runner-venv/bin" >> $GITHUB_PATH

      - name: Install Batfish dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install pybatfish pandas

      - name: Run Batfish validation
        run: |
          python3 batfish/validate.py

  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'test' }}
    runs-on:
      - self-hosted
      - network-runner

    needs:
      - validate
      - batfish

    environment:
      name: ${{ github.event.inputs.environment || 'test' }}

    env:
      TARGET_ENV: ${{ github.event.inputs.environment || 'test' }}

      ARISTA_API_USERNAME: ${{ secrets.ARISTA_API_USERNAME }}
      ARISTA_API_PASSWORD: ${{ secrets.ARISTA_API_PASSWORD }}
      ARISTA_SLEAF01_HOST: ${{ secrets.ARISTA_SLEAF01_HOST }}
      ARISTA_SLEAF02_HOST: ${{ secrets.ARISTA_SLEAF02_HOST }}
      ARISTA_SLEAF03_HOST: ${{ secrets.ARISTA_SLEAF03_HOST }}

      FORTIGATE_HOST: ${{ secrets.FORTIGATE_HOST }}
      FORTIGATE_API_TOKEN: ${{ secrets.FORTIGATE_API_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn iproute2 iputils-ping curl

      - name: Activate runner Python environment
        run: |
          echo "$HOME/runner-venv/bin" >> $GITHUB_PATH

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Write VPN configuration
        run: |
          cat > vpn.ovpn <<'EOF'
          ${{ secrets.VPN_PROFILE }}
          EOF

          cat > vpn-auth.txt <<'EOF'
          ${{ secrets.VPN_USERNAME }}
          ${{ secrets.VPN_PASSWORD }}
          EOF

          if [ ! -s vpn.ovpn ]; then
            echo "::error::VPN_PROFILE secret is empty"
            exit 1
          fi

          if [ "$(sed -n '1p' vpn-auth.txt | wc -c)" -le 1 ] || [ "$(sed -n '2p' vpn-auth.txt | wc -c)" -le 1 ]; then
            echo "::error::VPN_USERNAME or VPN_PASSWORD secret is empty"
            exit 1
          fi

          chmod 600 vpn.ovpn vpn-auth.txt

      - name: Connect to VPN
        run: |
          print_vpn_log() {
            if [ -f vpn.log ]; then
              echo "::group::OpenVPN log"
              sudo sed -n '1,200p' vpn.log
              echo "::endgroup::"
            fi
          }

          sudo openvpn \
            --config vpn.ovpn \
            --auth-user-pass vpn-auth.txt \
            --daemon \
            --log vpn.log \
            --writepid openvpn.pid || {
              echo "::error::OpenVPN failed to start"
              print_vpn_log
              exit 1
            }

          sleep 20

          VPN_PID="$(sudo sed -n '1p' openvpn.pid 2>/dev/null || true)"
          if [ -z "$VPN_PID" ] || ! sudo kill -0 "$VPN_PID" 2>/dev/null; then
            echo "::error::OpenVPN stopped during startup"
            print_vpn_log
            exit 1
          fi

      - name: Show VPN routes
        run: |
          ip route

      - name: Test Arista reachability
        run: |
          ping -c 3 "${ARISTA_SLEAF01_HOST}" || true
          ping -c 3 "${ARISTA_SLEAF02_HOST}" || true
          ping -c 3 "${ARISTA_SLEAF03_HOST}" || true

      - name: Test FortiGate reachability
        run: |
          ping -c 3 "${FORTIGATE_HOST}" || true

      - name: Run deployment dry-run
        run: |
          ansible-playbook ansible/playbooks/deploy.yml \
            -i "ansible/inventories/${TARGET_ENV}/hosts.yml" \
            -e "target_environment=${TARGET_ENV}" \
            --check \
            --diff

      - name: Deploy configuration
        run: |
          ansible-playbook ansible/playbooks/deploy.yml \
            -i "ansible/inventories/${TARGET_ENV}/hosts.yml" \
            -e "target_environment=${TARGET_ENV}"

      - name: Verify deployment
        run: |
          ansible-playbook ansible/playbooks/verify.yml \
            -i "ansible/inventories/${TARGET_ENV}/hosts.yml" \
            -e "target_environment=${TARGET_ENV}"

      - name: Cleanup VPN
        if: always()
        run: |
          sudo pkill openvpn || true
          rm -f vpn.ovpn vpn-auth.txt vpn.log openvpn.pid
