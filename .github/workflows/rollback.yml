---
name: Rollback Network Automation

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "test"
        type: choice
        options:
          - test
          - acceptance
          - production

      ref:
        description: "Git ref to rollback to, for example stable-production-v1 or a commit SHA"
        required: true
        type: string

      reason:
        description: "Reason for rollback"
        required: true
        type: string

jobs:
  rollback:
    name: Rollback ${{ github.event.inputs.environment }}
    runs-on:
      - self-hosted
      - network-runner

    environment:
      name: ${{ github.event.inputs.environment }}

    env:
      TARGET_ENV: ${{ github.event.inputs.environment }}

      ARISTA_API_USERNAME: ${{ secrets.ARISTA_API_USERNAME }}
      ARISTA_API_PASSWORD: ${{ secrets.ARISTA_API_PASSWORD }}
      ARISTA_SLEAF01_HOST: ${{ secrets.ARISTA_SLEAF01_HOST }}
      ARISTA_SLEAF02_HOST: ${{ secrets.ARISTA_SLEAF02_HOST }}
      ARISTA_SLEAF03_HOST: ${{ secrets.ARISTA_SLEAF03_HOST }}

      FORTIGATE_HOST: ${{ secrets.FORTIGATE_HOST }}
      FORTIGATE_API_TOKEN: ${{ secrets.FORTIGATE_API_TOKEN }}
      SUDO_PASSWORD: ${{ secrets.SUDO_PASSWORD }}

    steps:
      - name: Checkout selected rollback ref
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Show rollback information
        run: |
          echo "Rollback environment: ${{ github.event.inputs.environment }}"
          echo "Rollback ref: ${{ github.event.inputs.ref }}"
          echo "Rollback reason: ${{ github.event.inputs.reason }}"
          git rev-parse HEAD
          git log -1 --oneline

      - name: Verify sudo credentials
        run: |
          echo "Runner user: $(whoami)"
          echo "Runner groups: $(id -nG)"

          if [ -z "$SUDO_PASSWORD" ]; then
            echo "::error::SUDO_PASSWORD secret is empty"
            exit 1
          fi

          if sudo -n true 2>/dev/null; then
            echo "Passwordless sudo is available"
            exit 0
          fi

          printf '%s\n' "$SUDO_PASSWORD" | sudo -S -p '' -v || {
            echo "::error::SUDO_PASSWORD is invalid for the runner user, or the runner user is not allowed to use sudo"
            exit 1
          }

      - name: Install system dependencies
        run: |
          printf '%s\n' "$SUDO_PASSWORD" | sudo -S -p '' apt-get update
          printf '%s\n' "$SUDO_PASSWORD" | sudo -S -p '' apt-get install -y openvpn iproute2 iputils-ping curl

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Run Ansible syntax check
        run: |
          ansible-playbook ansible/playbooks/validate.yml \
            -i "ansible/inventories/${TARGET_ENV}/hosts.yml" \
            -e "target_environment=${TARGET_ENV}" \
            --syntax-check

          ansible-playbook ansible/playbooks/deploy.yml \
            -i "ansible/inventories/${TARGET_ENV}/hosts.yml" \
            -e "target_environment=${TARGET_ENV}" \
            --syntax-check

          ansible-playbook ansible/playbooks/verify.yml \
            -i "ansible/inventories/${TARGET_ENV}/hosts.yml" \
            -e "target_environment=${TARGET_ENV}" \
            --syntax-check

      - name: Run Ansible data validation
        run: |
          ansible-playbook ansible/playbooks/validate.yml \
            -i "ansible/inventories/${TARGET_ENV}/hosts.yml" \
            -e "target_environment=${TARGET_ENV}"

      - name: Write VPN configuration
        run: |
          cat > vpn.ovpn <<'EOF'
          ${{ secrets.VPN_PROFILE }}
          EOF

          cat > vpn-auth.txt <<'EOF'
          ${{ secrets.VPN_USERNAME }}
          ${{ secrets.VPN_PASSWORD }}
          EOF

          python3 - <<'PY'
          from pathlib import Path

          profile = Path("vpn.ovpn")
          text = profile.read_text()

          if "\\n" in text and text.count("\n") <= 1:
              profile.write_text(text.replace("\\n", "\n"))
          PY

          if [ ! -s vpn.ovpn ]; then
            echo "::error::VPN_PROFILE secret is empty"
            exit 1
          fi

          if [ "$(sed -n '1p' vpn-auth.txt | wc -c)" -le 1 ] || [ "$(sed -n '2p' vpn-auth.txt | wc -c)" -le 1 ]; then
            echo "::error::VPN_USERNAME or VPN_PASSWORD secret is empty"
            exit 1
          fi

          chmod 600 vpn.ovpn vpn-auth.txt

      - name: Validate VPN configuration
        run: |
          missing=0

          echo "VPN profile line count: $(wc -l < vpn.ovpn)"
          echo "VPN profile directives:"
          grep -E '^[[:space:]]*(client|tls-client|dev|proto|remote|nobind|auth-user-pass|remote-cert-tls|data-ciphers)([[:space:]]|$)' vpn.ovpn \
            | sed -E 's/^remote[[:space:]]+[^[:space:]]+/remote <redacted-host>/' \
            || true

          require_directive() {
            directive="$1"
            message="$2"

            if ! grep -Eq "^[[:space:]]*${directive}([[:space:]]|$)" vpn.ovpn; then
              echo "::error::$message"
              missing=1
            fi
          }

          require_any_directive() {
            message="$1"
            shift

            for directive in "$@"; do
              if grep -Eq "^[[:space:]]*${directive}([[:space:]]|$)" vpn.ovpn; then
                return 0
              fi
            done

            echo "::error::$message"
            missing=1
          }

          require_directive "remote" "VPN_PROFILE must include a remote directive, for example: remote vpn.example.com 1194"
          require_any_directive "VPN_PROFILE should include client or tls-client" "client" "tls-client"
          require_any_directive "VPN_PROFILE should include proto udp or proto tcp-client" "proto"

          if grep -Eq "^[[:space:]]*nobind([[:space:]]|$)" vpn.ovpn && ! grep -Eq "^[[:space:]]*remote([[:space:]]|$)" vpn.ovpn; then
            echo "::error::VPN_PROFILE contains nobind, but no remote directive"
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Connect to VPN
        run: |
          print_vpn_log() {
            if [ -f vpn.log ]; then
              echo "::group::OpenVPN log"
              printf '%s\n' "$SUDO_PASSWORD" | sudo -S -p '' sed -n '1,200p' vpn.log
              echo "::endgroup::"
            fi
          }

          printf '%s\n' "$SUDO_PASSWORD" | sudo -S -p '' openvpn \
            --config vpn.ovpn \
            --dev tun \
            --pull \
            --auth-user-pass vpn-auth.txt \
            --daemon \
            --log vpn.log \
            --writepid openvpn.pid || {
              echo "::error::OpenVPN failed to start"
              print_vpn_log
              exit 1
            }

          sleep 20

          VPN_PID="$(printf '%s\n' "$SUDO_PASSWORD" | sudo -S -p '' sed -n '1p' openvpn.pid 2>/dev/null || true)"
          if [ -z "$VPN_PID" ] || ! printf '%s\n' "$SUDO_PASSWORD" | sudo -S -p '' kill -0 "$VPN_PID" 2>/dev/null; then
            echo "::error::OpenVPN stopped during startup"
            print_vpn_log
            exit 1
          fi

      - name: Show VPN routes
        run: |
          ip route

      - name: Rollback dry-run
        run: |
          ansible-playbook ansible/playbooks/deploy.yml \
            -i "ansible/inventories/${TARGET_ENV}/hosts.yml" \
            -e "target_environment=${TARGET_ENV}" \
            --check \
            --diff

      - name: Apply rollback configuration
        run: |
          ansible-playbook ansible/playbooks/deploy.yml \
            -i "ansible/inventories/${TARGET_ENV}/hosts.yml" \
            -e "target_environment=${TARGET_ENV}"

      - name: Verify rollback
        run: |
          ansible-playbook ansible/playbooks/verify.yml \
            -i "ansible/inventories/${TARGET_ENV}/hosts.yml" \
            -e "target_environment=${TARGET_ENV}"

      - name: Cleanup VPN
        if: always()
        run: |
          printf '%s\n' "$SUDO_PASSWORD" | sudo -S -p '' pkill openvpn || true
          rm -f vpn.ovpn vpn-auth.txt vpn.log openvpn.pid
