---
name: Rollback Network Automation

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "test"
        type: choice
        options:
          - test
          - acceptance
          - production

      ref:
        description: "Git ref to rollback to, for example stable-production-v1 or a commit SHA"
        required: true
        type: string

      reason:
        description: "Reason for rollback"
        required: true
        type: string

jobs:
  rollback:
    name: Rollback ${{ github.event.inputs.environment }}
    runs-on:
      - self-hosted
      - network-runner

    environment:
      name: ${{ github.event.inputs.environment }}

    env:
      TARGET_ENV: ${{ github.event.inputs.environment }}

      ARISTA_API_USERNAME: ${{ secrets.ARISTA_API_USERNAME }}
      ARISTA_API_PASSWORD: ${{ secrets.ARISTA_API_PASSWORD }}
      ARISTA_SLEAF01_HOST: ${{ secrets.ARISTA_SLEAF01_HOST }}
      ARISTA_SLEAF02_HOST: ${{ secrets.ARISTA_SLEAF02_HOST }}
      ARISTA_SLEAF03_HOST: ${{ secrets.ARISTA_SLEAF03_HOST }}

      FORTIGATE_HOST: ${{ secrets.FORTIGATE_HOST }}
      FORTIGATE_API_TOKEN: ${{ secrets.FORTIGATE_API_TOKEN }}

    steps:
      - name: Checkout selected rollback ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Show rollback information
        run: |
          echo "Rollback environment: ${{ github.event.inputs.environment }}"
          echo "Rollback ref: ${{ github.event.inputs.ref }}"
          echo "Rollback reason: ${{ github.event.inputs.reason }}"
          git rev-parse HEAD
          git log -1 --oneline

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn iproute2 iputils-ping curl

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Run Ansible syntax check
        run: |
          ansible-playbook ansible/playbooks/validate.yml \
            -i "ansible/inventories/${TARGET_ENV}/hosts.yml" \
            -e "target_environment=${TARGET_ENV}" \
            --syntax-check

          ansible-playbook ansible/playbooks/deploy.yml \
            -i "ansible/inventories/${TARGET_ENV}/hosts.yml" \
            -e "target_environment=${TARGET_ENV}" \
            --syntax-check

          ansible-playbook ansible/playbooks/verify.yml \
            -i "ansible/inventories/${TARGET_ENV}/hosts.yml" \
            -e "target_environment=${TARGET_ENV}" \
            --syntax-check

      - name: Run Ansible data validation
        run: |
          ansible-playbook ansible/playbooks/validate.yml \
            -i "ansible/inventories/${TARGET_ENV}/hosts.yml" \
            -e "target_environment=${TARGET_ENV}"

      - name: Write VPN configuration
        run: |
          cat > vpn.ovpn <<'EOF'
          ${{ secrets.VPN_PROFILE }}
          EOF

          cat > vpn-auth.txt <<'EOF'
          ${{ secrets.VPN_USERNAME }}
          ${{ secrets.VPN_PASSWORD }}
          EOF

          chmod 600 vpn.ovpn vpn-auth.txt

      - name: Connect to VPN
        run: |
          sudo openvpn \
            --config vpn.ovpn \
            --auth-user-pass vpn-auth.txt \
            --daemon \
            --log vpn.log

          sleep 20

      - name: Show VPN routes
        run: |
          ip route

      - name: Rollback dry-run
        run: |
          ansible-playbook ansible/playbooks/deploy.yml \
            -i "ansible/inventories/${TARGET_ENV}/hosts.yml" \
            -e "target_environment=${TARGET_ENV}" \
            --check \
            --diff

      - name: Apply rollback configuration
        run: |
          ansible-playbook ansible/playbooks/deploy.yml \
            -i "ansible/inventories/${TARGET_ENV}/hosts.yml" \
            -e "target_environment=${TARGET_ENV}"

      - name: Verify rollback
        run: |
          ansible-playbook ansible/playbooks/verify.yml \
            -i "ansible/inventories/${TARGET_ENV}/hosts.yml" \
            -e "target_environment=${TARGET_ENV}"

      - name: Cleanup VPN
        if: always()
        run: |
          sudo pkill openvpn || true
          rm -f vpn.ovpn vpn-auth.txt vpn.log
