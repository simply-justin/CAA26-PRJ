name: Validate

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate configuration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y docker.io
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run YAML lint
        run: |
          yamllint ansible/ .github/workflows/ sdn/ kubernetes/

      - name: Run Ansible lint
        run: |
          ansible-lint ansible/playbooks/ ansible/roles/

      - name: Run Ansible syntax check
        run: |
          ansible-playbook ansible/playbooks/validate.yml -i ansible/inventories/test/hosts.yml --syntax-check
          ansible-playbook ansible/playbooks/deploy.yml -i ansible/inventories/test/hosts.yml --syntax-check
          ansible-playbook ansible/playbooks/verify.yml -i ansible/inventories/test/hosts.yml --syntax-check

      - name: Run Ansible data validation
        run: |
          ansible-playbook ansible/playbooks/validate.yml \
            -i ansible/inventories/test/hosts.yml

  batfish:
    name: Validate network with Batfish
    runs-on: ubuntu-latest
    needs:
      - validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start Batfish
        run: |
          docker run -d \
            --name batfish \
            -p 9997:9997 \
            -p 9996:9996 \
            batfish/allinone

          sleep 30

      - name: Install pybatfish
        run: |
          python -m pip install --upgrade pip
          pip install pybatfish pandas

      - name: Run Batfish validation
        run: |
          python batfish/validate.py