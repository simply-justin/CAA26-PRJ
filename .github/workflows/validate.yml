---
name: Validate Network Automation

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate configuration
    runs-on:
      - self-hosted
      - network-runner

    env:
      TARGET_ENV: test

      ARISTA_API_USERNAME: dummy
      ARISTA_API_PASSWORD: dummy
      ARISTA_SLEAF01_HOST: 192.0.2.4
      ARISTA_SLEAF02_HOST: 192.0.2.5
      ARISTA_SLEAF03_HOST: 192.0.2.6
      FORTIGATE_HOST: 192.0.2.1
      FORTIGATE_API_TOKEN: dummy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Run YAML lint
        run: |
          yamllint ansible/ .github/workflows/ batfish/

      - name: Run Ansible lint
        run: |
          ansible-lint ansible/playbooks/ ansible/roles/

      - name: Run Ansible syntax check
        run: |
          ansible-playbook ansible/playbooks/validate.yml \
            -i "ansible/inventories/${TARGET_ENV}/hosts.yml" \
            -e "target_environment=${TARGET_ENV}" \
            --syntax-check

          ansible-playbook ansible/playbooks/deploy.yml \
            -i "ansible/inventories/${TARGET_ENV}/hosts.yml" \
            -e "target_environment=${TARGET_ENV}" \
            --syntax-check

          ansible-playbook ansible/playbooks/verify.yml \
            -i "ansible/inventories/${TARGET_ENV}/hosts.yml" \
            -e "target_environment=${TARGET_ENV}" \
            --syntax-check

      - name: Run Ansible data validation
        run: |
          ansible-playbook ansible/playbooks/validate.yml \
            -i "ansible/inventories/${TARGET_ENV}/hosts.yml" \
            -e "target_environment=${TARGET_ENV}"
