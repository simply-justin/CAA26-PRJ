---
environment_name: acceptance

datacenter_network:
  enabled: true

  topology:
    type: spine_leaf
    rules:
      leafs_connect_to_all_spines: true
      spines_connect_to_all_leafs: true
      leaf_to_leaf_connections_allowed: false
      spine_to_spine_connections_allowed: false
      endpoints_only_on_leafs: true

  evpn_vxlan:
    enabled: true
    control_plane: evpn
    overlay_protocol: vxlan
    vlan_aware_bundle: Main
    route_target: "65000:10000"
    vxlan_interface: Vxlan1
    vxlan_source_interface: Loopback0
    vxlan_udp_port: 4789

  bgp:
    enabled: true
    asn: 65000
    router_id: 10.0.3.1
    spine_peer_group: SPINES
    spine_remote_as: 65000
    evpn_enabled: true
    maximum_paths: 32

  vrfs:
    - name: UWAN
      rd: "10.0.0.2:10"
      vni: 50010
      route_target_import: "65000:50010"
      route_target_export: "65000:50010"
      managed: false

  vlans:
    - id: 2
      name: K8S-Nodes-Web
      vni: 10002
      managed: true

    - id: 3
      name: K8S-Nodes-KVirt
      vni: 10003
      managed: true

    - id: 4
      name: LAN
      vni: 10004
      managed: true

    - id: 6
      name: DMZ
      vni: 10006
      managed: true

    - id: 10
      name: UWAN_Internet
      vni: 10010
      managed: false
      protected: true

  protected_vlans:
    - 1
    - 10

  vlan_aware_bundle:
    name: Main
    vlans:
      - 2
      - 3
      - 4
      - 6
      - 10

  interfaces: []

network_security_stack:
  zero_trust:
    enabled: true
    default_policy: deny
    explicit_allow_required: true
    restrict_lateral_movement: true
    identity_based_access: true

  fortigate:
    enabled: true
    vdom: root
    logging_enabled: true

  zones:
    - name: LAN
      vlan_id: 4
      subnet: 172.19.4.0/24
      interface: vlan4

    - name: DMZ
      vlan_id: 6
      subnet: 172.19.6.0/24
      interface: vlan6

    - name: UWAN_Internet
      vlan_id: 10
      interface: vlan10
      protected: true

  firewall_services: []

  firewall_policies: []

iac_sdn:
  source_control:
    platform: github
    pull_requests_required: true
    protected_main_branch: true

  ci_cd:
    platform: github_actions
    runner: RUNNER01
    runner_type: self_hosted
    validate_before_deploy: true
    dry_run_before_deploy: true
    manual_approval_for_production: true

  ansible:
    enabled: true
    execution_method: direct_device_api
    execution_location: RUNNER01
    idempotent_playbooks: true
    check_mode_supported: true

  connectivity:
    method: openvpn
    required_for_deployment: true

  batfish:
    enabled: true
    snapshot_environment: test
    validate_before_deploy: true

  sdn_controller:
    enabled: false
    reason: "Directe API-aansturing van Arista en FortiGate wordt gebruikt. Een aparte SDN-controller kan later worden toegevoegd wanneer centrale policy-orchestration nodig is."

monitoring_logging:
  librenms:
    enabled: false
    protocol: snmp
    purpose: network_monitoring

  oxidized:
    enabled: false
    protocol: ssh
    config_archiving: true
    git_backend: true
    remove_secret_for_fortigate: true

authentication_authorization:
  identity_source: active_directory

  entra_id:
    enabled: false
    mfa_enabled: true

  nps_radius:
    enabled: false
    authentication_protocol: eap_tls
    dynamic_vlan_assignment: true

  admin_access:
    sdn_admin_group: GS-UORS-SDN-Admins
    mfa_required: true
    management_segment: management
