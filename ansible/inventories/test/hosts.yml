all:
  vars:
    ansible_python_interpreter: /usr/bin/python3

  children:
    automation_targets:
      hosts:
        infra-test-server:
          ansible_host: "{{ lookup('env', 'ANSIBLE_HOST') }}"
          ansible_user: "{{ lookup('env', 'ANSIBLE_USER') }}"
          ansible_ssh_private_key_file: ~/.ssh/id_rsa

    arista:
      hosts:
        leaf01:
          ansible_host: "{{ lookup('env', 'ANSIBLE_HOST') }}"

    fortigate:
      hosts:
        fortigate01:
          ansible_host: "{{ lookup('env', 'ANSIBLE_HOST') }}"
          
    kubernetes:
      hosts:
        k8s01:
          ansible_host: "{{ lookup('env', 'ANSIBLE_HOST') }}"