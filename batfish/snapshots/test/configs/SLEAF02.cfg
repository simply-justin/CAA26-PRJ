hostname SLEAF02

router bgp 65000
   router-id 10.0.3.1
   update wait-for-convergence
   update wait-install
   no bgp default ipv4-unicast
   maximum-paths 32
   neighbor SPINES peer group
   neighbor SPINES remote-as 65000
   neighbor SPINES bfd
   neighbor SPINES route-reflector-client
   neighbor SPINES send-community standard extended
   neighbor 10.0.2.0 peer group SPINES
   !
   vlan-aware-bundle Main
      rd auto
      route-target both 65000:10000
      redistribute learned
      vlan 2-4,6,10
   !
   address-family evpn
      neighbor SPINES activate
      neighbor SPINES encapsulation vxlan
   !
   vrf UWAN
      rd 10.0.0.2:10
      route-target import evpn 65000:50010
      route-target export evpn 65000:50010
      redistribute connected
!

interface Vxlan1
   vxlan source-interface Loopback0
   vxlan udp-port 4789
   vxlan vlan 2 vni 10002
   vxlan vlan 3 vni 10003
   vxlan vlan 4 vni 10004
   vxlan vlan 6 vni 10006
   vxlan vlan 10 vni 10010
   vxlan vrf UWAN vni 50010
!

vlan 2
   name K8S-Nodes-Web
!
vlan 3
   name K8S-Nodes-KVirt
!
vlan 4
   name LAN
!
vlan 6
   name DMZ
!
vlan 10
   name UWAN_Internet
!
